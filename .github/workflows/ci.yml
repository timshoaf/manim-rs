name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace
      # Docs are a hard gate (RUSTDOCFLAGS=-D warnings) — broken links / bad
      # intra-doc refs fail the build.
      - run: cargo doc --workspace --no-deps

  # Software-rendered golden-image tests. `cargo test --workspace` above skips
  # them (no GPU adapter on the default runner); here we install a software
  # Vulkan adapter (mesa lavapipe) and set REQUIRE_GPU=1 so a missing adapter is
  # a hard failure instead of a silent skip.
  golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mesa lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
      - name: Golden-image tests
        env:
          REQUIRE_GPU: "1"
        # Single-threaded: parallel test threads contend on the one software
        # adapter and can stall.
        run: cargo test -p manim-render -- --test-threads=1

  # Optional-feature matrix: the base build stays lean, so exercise the gated
  # code paths explicitly.
  features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Native realtime preview window (winit).
      - run: cargo build -p manim-render -p manim --features preview
      # Syntax-highlighted `Code` mobject (syntect).
      - run: cargo test -p manim-text -p manim --features code

  # Documentation-site smoke test: proves the book still builds on every branch
  # without needing a GPU, ffmpeg, or any rendered media.
  #
  # No assets are produced here and none are required — mdBook renders a page
  # whose <video> src is missing without complaining, which is exactly what we
  # want for branch validation. The deploy workflow (pages.yml) is the one that
  # renders the real figures and gates on them via check-assets.sh.
  #
  # What this DOES catch, and what breaks most often: a chapter listed in
  # SUMMARY.md that doesn't exist (create-missing = false), and an
  # {{#include}} pointing at an example file that was renamed or moved. Both
  # are silent-until-deploy failures otherwise.
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.4.52
      - name: Build the book (no assets)
        run: mdbook build site
      # mdBook logs a broken include as an ERROR line but still exits 0, so the
      # exit code alone would not catch a renamed example file.
      - name: Fail on broken includes
        run: |
          set -euo pipefail
          if mdbook build site 2>&1 | grep -E '^\S+ \S+ \[ERROR\]'; then
            echo "::error::mdbook reported errors (broken {{#include}} or link)"
            exit 1
          fi
          echo "no mdbook errors"

  wasm-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # Pure crates.
      - run: cargo check -p manim-math -p manim-color -p manim-core --target wasm32-unknown-unknown
      # Renderer + facade, default (no window/ffmpeg) and with the browser `web` feature.
      - run: cargo check -p manim-render -p manim --target wasm32-unknown-unknown
      - run: cargo check -p manim-render -p manim --target wasm32-unknown-unknown --features web
      # Dioxus <ManimPlayer> component.
      - run: cargo check -p manim-dioxus --target wasm32-unknown-unknown
      # wasm docs are a hard gate too: canvas.rs (and the dioxus player) only
      # compile for wasm32+web, so the native doc gate above never sees their
      # intra-doc links.
      - run: cargo doc -p manim-render --no-deps --target wasm32-unknown-unknown --features web
      - run: cargo doc -p manim-dioxus --no-deps --target wasm32-unknown-unknown
      # Standalone browser demos (excluded from the workspace).
      - run: cargo build --target wasm32-unknown-unknown --manifest-path examples/web-vanilla/Cargo.toml
      - run: cargo build --target wasm32-unknown-unknown --manifest-path examples/dioxus-app/Cargo.toml
